version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bherrmann81-maintainerr_web_1
      APP_PORT: 6246

  web:
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: bherrmann81-maintainerr_web_1
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - TZ=Europe/Berlin
    volumes:
      - ${APP_DATA_DIR}/data:/opt/data
